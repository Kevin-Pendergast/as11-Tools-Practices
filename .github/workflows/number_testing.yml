name: Number Testing Workflow

on:
  push:
    branches: [ "main" ]

jobs:
  test-application:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/
        with:
          python-version: '3.x'

      - name: Run Test 1 (10 numbers)
        run: |
          python find_lowest_number.py test_data/test1_input.txt actual1.txt
          diff actual1.txt test_data/test1_expected.txt

      - name: Test 2 (1 number)
        run: |
          python find_lowest_number.py test_data/test2_input.txt actual2.txt
          diff actual2.txt test_data/test2_expected.txt

      - name: Run Test 3 (Blank file)
        run: |
          python find_lowest_number.py test_data/test3_input.txt actual3.txt
          diff actual3.txt test_data/test3_expected.txt
